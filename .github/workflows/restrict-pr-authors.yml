name: Restrict pull request authors

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  enforce-author:
    if: ${{ !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain and close unauthorized pull request
        uses: actions/github-script@v7
        with:
          script: |
            const association = context.payload.pull_request.author_association;
            const author = context.payload.pull_request.user.login;
            const message = [
              '@' + author + ', este repositorio solo acepta pull requests de colaboradores registrados.',
              '',
              'Asociación detectada: ' + association + '.',
              'Solicita acceso al propietario antes de volver a enviar el cambio.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              state: 'closed'
            });
